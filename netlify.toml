[build]
  # Build the React app, then copy static marketing pages into dist so they're served alongside it.
  # client/app.html (not index.html) is the React entry — so copying index.html here doesn't conflict.
  command = """
    cd client && npm install && npm run build &&
    cp ../index.html dist/index.html &&
    cp ../faq.html dist/faq.html &&
    cp ../calculator.html dist/calculator.html &&
    cp ../privacy.html dist/privacy.html &&
    cp ../terms.html dist/terms.html &&
    cp ../plan.html dist/plan.html 2>/dev/null || true &&
    cp ../intake.html dist/intake-legacy.html 2>/dev/null || true
  """
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"

# ─── SECURITY HEADERS ────────────────────────────────────────────────────────
# Applied to all routes on plus4performance.com

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://api.stripe.com wss://*.supabase.co https://plus4performance-production.up.railway.app; frame-src https://js.stripe.com; object-src 'none'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cache-Control = "public, max-age=0, must-revalidate"

# ─── CACHE HEADERS FOR STATIC ASSETS ─────────────────────────────────────────
# Vite outputs hashed filenames under /assets/ — safe to cache forever

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# React SPA routes — rewrite to app.html (the React entry) so client-side routing works.
# Marketing pages (/, /faq.html etc.) are served as static files and NOT rewritten.
[[redirects]]
  from = "/signup"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/forgot-password"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/intake"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/snapshot"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/dashboard/*"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/app.html"
  status = 200
